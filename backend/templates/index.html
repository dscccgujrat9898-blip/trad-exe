<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>{{ app_name }}</title>
  <style>
    :root { --bg:#0b1220; --card:#121b2e; --muted:#8ea0c5; --text:#ecf2ff; --line:#22304d; --accent:#66b3ff; --good:#32c48d; --bad:#ff6b81; }
    * { box-sizing: border-box; }
    body { margin:0; font-family:Inter,Arial,sans-serif; background:var(--bg); color:var(--text); }
    .wrap { max-width:1300px; margin:0 auto; padding:20px; }
    .top { display:flex; gap:12px; align-items:center; flex-wrap:wrap; margin-bottom:18px; }
    input, select, button { background:#0d1627; color:var(--text); border:1px solid var(--line); border-radius:12px; padding:12px 14px; }
    button { cursor:pointer; background:linear-gradient(135deg,#1a65ff,#2d9bff); border:none; }
    .grid { display:grid; gap:16px; }
    .g-4 { grid-template-columns: repeat(4, 1fr); }
    .g-3 { grid-template-columns: repeat(3, 1fr); }
    .g-2 { grid-template-columns: repeat(2, 1fr); }
    .card { background:var(--card); border:1px solid var(--line); border-radius:20px; padding:18px; box-shadow:0 10px 30px rgba(0,0,0,.18); }
    .muted { color:var(--muted); }
    .big { font-size:28px; font-weight:700; }
    .good { color:var(--good); }
    .bad { color:var(--bad); }
    table { width:100%; border-collapse:collapse; }
    th, td { padding:10px 8px; border-bottom:1px solid var(--line); text-align:left; font-size:14px; }
    .pill { display:inline-block; padding:7px 10px; border-radius:999px; background:#18243d; border:1px solid var(--line); }
    .watchlist { margin-top:18px; }
    .reasons li, .warn li { margin-bottom:6px; }
    @media (max-width: 1000px){ .g-4, .g-3, .g-2 { grid-template-columns:1fr; } }
  </style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div style="font-size:26px;font-weight:800;">{{ app_name }}</div>
    <input id="symbolInput" value="{{ symbols[0] if symbols else 'RELIANCE' }}" placeholder="Enter symbol e.g. RELIANCE" />
    <button onclick="loadReport()">Load Report</button>
    <input id="qtyInput" type="number" value="10" min="1" />
    <select id="productInput"><option>MIS</option><option>CNC</option><option>NRML</option></select>
    <select id="sideInput"><option>BUY</option><option>SELL</option></select>
    <button onclick="loadCalc()">Calc Cost</button>
  </div>

  <div class="grid g-4">
    <div class="card"><div class="muted">Price</div><div class="big" id="price">-</div><div id="change"></div></div>
    <div class="card"><div class="muted">OHLC</div><div id="ohlc">-</div></div>
    <div class="card"><div class="muted">Trend Score</div><div class="big" id="trendScore">-</div><div id="trendBucket"></div></div>
    <div class="card"><div class="muted">Options Bias</div><div id="optionsBias">-</div></div>
  </div>

  <div class="grid g-3" style="margin-top:16px;">
    <div class="card"><h3>Performance</h3><table><tbody id="perfTable"></tbody></table></div>
    <div class="card"><h3>Advice Views</h3><div><div class="pill">Investment</div><p id="investmentView"></p><div class="pill">Swing</div><p id="swingView"></p><div class="pill">Intraday</div><p id="intradayView"></p></div></div>
    <div class="card"><h3>Cost Estimate</h3><table><tbody id="calcTable"></tbody></table></div>
  </div>

  <div class="grid g-2" style="margin-top:16px;">
    <div class="card"><h3>Seasonality</h3><div id="seasonality"></div></div>
    <div class="card"><h3>Trend Reasons & Warnings</h3><div class="grid g-2"><div><div class="pill">Reasons</div><ul class="reasons" id="reasons"></ul></div><div><div class="pill">Warnings</div><ul class="warn" id="warnings"></ul></div></div></div>
  </div>

  <div class="card watchlist">
    <h3>Smart Watchlist Ranking</h3>
    <table>
      <thead><tr><th>Symbol</th><th>Price</th><th>Day %</th><th>Week %</th><th>Month %</th><th>Year %</th><th>Trend</th><th>Bucket</th></tr></thead>
      <tbody id="watchlistTable"></tbody>
    </table>
  </div>
</div>
<script>
async function json(url){ const r = await fetch(url); return await r.json(); }
function clsPct(v){ return (v >= 0) ? 'good' : 'bad'; }
function fmt(v){ return (typeof v === 'number') ? v.toFixed(2) : v; }

async function loadReport(){
  const symbol = document.getElementById('symbolInput').value.trim().toUpperCase();
  const data = await json(`/api/report/${symbol}`);
  document.getElementById('price').textContent = `₹ ${fmt(data.quote.price)}`;
  document.getElementById('change').innerHTML = `<span class="${clsPct(data.quote.change_pct)}">${fmt(data.quote.change)} (${fmt(data.quote.change_pct)}%)</span>`;
  document.getElementById('ohlc').innerHTML = `O ${fmt(data.quote.open)} | H ${fmt(data.quote.high)} | L ${fmt(data.quote.low)} | PC ${fmt(data.quote.prev_close)}`;
  document.getElementById('trendScore').textContent = data.trend.score;
  document.getElementById('trendBucket').innerHTML = `<span class="pill">${data.trend.bucket}</span>`;
  document.getElementById('optionsBias').innerHTML = data.options ? `PCR ${fmt(data.options.pcr)} | ATM ${fmt(data.options.atm_strike)} | Max Pain ${fmt(data.options.max_pain_estimate)}` : 'No options data';

  const p = data.performance;
  document.getElementById('perfTable').innerHTML = `
    <tr><td>Daily</td><td class="${clsPct(p.daily_pct)}">${fmt(p.daily_pct)}%</td></tr>
    <tr><td>Weekly</td><td class="${clsPct(p.weekly_pct)}">${fmt(p.weekly_pct)}%</td></tr>
    <tr><td>Monthly</td><td class="${clsPct(p.monthly_pct)}">${fmt(p.monthly_pct)}%</td></tr>
    <tr><td>Yearly</td><td class="${clsPct(p.yearly_pct)}">${fmt(p.yearly_pct)}%</td></tr>
    <tr><td>CAGR-like</td><td>${fmt(p.cagr_like_pct)}%</td></tr>
    <tr><td>From 52W High</td><td>${fmt(p.distance_from_52w_high_pct)}%</td></tr>
    <tr><td>From 52W Low</td><td>${fmt(p.distance_from_52w_low_pct)}%</td></tr>`;

  document.getElementById('investmentView').textContent = data.investment_view;
  document.getElementById('swingView').textContent = data.swing_view;
  document.getElementById('intradayView').textContent = data.intraday_view;

  document.getElementById('seasonality').innerHTML = `
    <p><b>Best months:</b> ${data.seasonality.best_months.join(', ')}</p>
    <p><b>Weak months:</b> ${data.seasonality.weak_months.join(', ')}</p>
    <p><b>Best weekdays:</b> ${data.seasonality.best_weekdays.join(', ')}</p>
    <p><b>Weak weekdays:</b> ${data.seasonality.weak_weekdays.join(', ')}</p>`;

  document.getElementById('reasons').innerHTML = data.trend.reasons.map(x => `<li>${x}</li>`).join('');
  document.getElementById('warnings').innerHTML = (data.warnings || []).map(x => `<li>${x}</li>`).join('') || '<li>No major warning flags.</li>';

  loadCalc();
}

async function loadCalc(){
  const symbol = document.getElementById('symbolInput').value.trim().toUpperCase();
  const qty = document.getElementById('qtyInput').value;
  const product = document.getElementById('productInput').value;
  const side = document.getElementById('sideInput').value;
  const data = await json(`/api/calc/${symbol}?quantity=${qty}&product=${product}&side=${side}`);
  document.getElementById('calcTable').innerHTML = `
    <tr><td>Price</td><td>₹ ${fmt(data.price)}</td></tr>
    <tr><td>Gross Value</td><td>₹ ${fmt(data.gross_value)}</td></tr>
    <tr><td>Brokerage</td><td>₹ ${fmt(data.brokerage_estimate)}</td></tr>
    <tr><td>Charges</td><td>₹ ${fmt(data.taxes_and_charges_estimate)}</td></tr>
    <tr><td>Margin Req.</td><td>₹ ${fmt(data.margin_required_estimate)}</td></tr>
    <tr><td>Leverage Est.</td><td>${fmt(data.leverage_estimate)}x</td></tr>
    <tr><td>Total Payable</td><td>₹ ${fmt(data.total_payable_estimate)}</td></tr>`;
}

async function loadWatchlist(){
  const data = await json('/api/watchlist');
  document.getElementById('watchlistTable').innerHTML = data.items.map(r => `
    <tr>
      <td><a href="#" onclick="document.getElementById('symbolInput').value='${r.symbol}';loadReport();return false;">${r.symbol}</a></td>
      <td>₹ ${fmt(r.price)}</td>
      <td class="${clsPct(r.change_pct)}">${fmt(r.change_pct)}%</td>
      <td class="${clsPct(r.weekly_pct)}">${fmt(r.weekly_pct)}%</td>
      <td class="${clsPct(r.monthly_pct)}">${fmt(r.monthly_pct)}%</td>
      <td class="${clsPct(r.yearly_pct)}">${fmt(r.yearly_pct)}%</td>
      <td>${r.trend_score}</td>
      <td>${r.trend_bucket}</td>
    </tr>`).join('');
}

loadReport();
loadWatchlist();
</script>
</body>
</html>
